sky:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: localhost
    port: 3306
    database: sky_take_out
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  alioss:
    endpoint: oss-cn-beijing.aliyuncs.com
    region: cn-beijing
    # 从环境变量读取OSS凭证 (推荐方式)
    # PowerShell: $env:OSS_ACCESS_KEY_ID = "你的值"
    # CMD: set OSS_ACCESS_KEY_ID=你的值
    # 或直接在此处填写: access-key: LTAI5tYourKey (不推荐，避免提交到Git)
    access-key: ${OSS_ACCESS_KEY_ID}
    secret-key: ${OSS_ACCESS_KEY_SECRET}
    bucket-name: sky-takeout

# 配置说明: 详见 ENVIRONMENT_SETUP.md 和 问题修复说明.md

