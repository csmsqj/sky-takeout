# 数据库和Redis是框架属性，必须放在 spring 下面！
spring:
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      # 直接写死完整 URL，直观且不容易出错
      url: jdbc:mysql://localhost:3306/sky_take_out?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:123456}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: 0

# OSS是你自己的业务属性，对应 AliOssProperties，必须放在 sky 下面！
sky:
  alioss:
    endpoint: oss-cn-beijing.aliyuncs.com
    region: cn-beijing
    bucket-name: sky-keyout
    # 本地开发测试时，请暂时在这里填入你的真实密钥；提交代码前务必删掉或改用环境变量
    access-key: ${OSS_ACCESS_KEY_ID}
    secret-key: ${OSS_ACCESS_KEY_SECRET}
  wechat:
    appid: ${WECHAT_APPID:wxe735666adbfd54e7}
    secret: ${WECHAT_SECRET}