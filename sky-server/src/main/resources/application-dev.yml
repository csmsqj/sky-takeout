sky:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: localhost
    port: 3306
    database: sky_take_out
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  alioss:
    endpoint: oss-cn-beijing.aliyuncs.com
    region: cn-beijing
    access-key: ${ALIBABACLOUD_ACCESS_KEY_ID}   # 从环境变量读取 Aliyun Access Key ID
    secret-key: ${ALIBABACLOUD_ACCESS_KEY_SECRET}   # 从环境变量读取 Aliyun Access Key Secret
    bucket-name: sky-takeout


