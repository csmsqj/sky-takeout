sky:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: localhost
    port: 3306
    database: sky_take_out
    username: ${DB_USERNAME:root}  # 数据库用户名，默认为root
    password: ${DB_PASSWORD:123456}  # 数据库密码，默认为123456
  alioss:
    endpoint: oss-cn-beijing.aliyuncs.com  # 阿里云OSS服务端点
    region: cn-beijing  # OSS区域
    access-key: ${OSS_ACCESS_KEY_ID}  # 从环境变量读取，不可为空
    secret-key: ${OSS_ACCESS_KEY_SECRET}  # 从环境变量读取，不可为空
    bucket-name: sky-takeout  # OSS Bucket名称

# 环境变量配置说明：
# 1. OSS_ACCESS_KEY_ID 和 OSS_ACCESS_KEY_SECRET 必须配置
# 2. 配置方法请参考项目根目录下的 docs/环境变量配置指南.md
# 3. 不要将真实的AccessKey直接写在此配置文件中！
